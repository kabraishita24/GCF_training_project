<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Lost Item</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

<style>

/* GRID LAYOUT */
.form-wrapper {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    flex-wrap: wrap;
}

/* LEFT FORM */
.form-card {
    width: 350px;
    padding: 30px;
    border-radius: 18px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.6);
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
}

/* RIGHT PREVIEW */
.preview-card {
    width: 300px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(15px);
    text-align: center;
}

/* IMAGE PREVIEW */
#preview {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-top: 10px;
    display: none;
}

/* UPLOAD BUTTON */
.upload-box {
    border: 2px dashed #4a90e2;
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(74,144,226,0.1);
}

/* INPUT */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 13px;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* DARK MODE */
body.dark .form-card,
body.dark .preview-card {
    background: rgba(255,255,255,0.05);
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Asset Recovery Hub</div>
    <div class="nav-right">
        <button onclick="toggleDark()">🌙</button>
        <a href="/index">Home</a>
    </div>
</div>

<!-- HEADER -->
<div class="hero">
    <h1>Report Lost Item 🔍</h1>
    <p>Provide details and upload image for better matching</p>
</div>

<div class="form-wrapper">

    <!-- FORM -->
    <form method="POST" class="form-card" enctype="multipart/form-data">

        <div class="input-group">
            <label>Item Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="input-group">
            <label>Description</label>
            <input type="text" name="desc" required>
        </div>

        <div class="input-group">
            <label>Location</label>
            <input type="text" name="location" required>
        </div>

        <div class="input-group">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>

        <!-- CAMERA / FILE -->
        <div class="input-group">
            <label>Upload Item Image 📸</label>
            <input type="file" name="image" accept="image/*" capture="environment" onchange="previewImage(event)">
        </div>

        <button type="submit">Submit Report</button>

    </form>

    <!-- PREVIEW -->
    <div class="preview-card">
        <h3>Image Preview</h3>
        <div class="upload-box" onclick="triggerFile()">
            Click or Capture Image
        </div>
        <img id="preview">
    </div>

</div>

<!-- JS -->
<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}

function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('preview');

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }
}

function triggerFile() {
    document.querySelector('input[type="file"]').click();
}
</script>

</body>
</html>
